name: Selenium E2E Tests + Allure Report

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; new pushes wait rather than cancel.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # Restore the previous Allure report so trend charts carry over.
      # On the very first run there is no cache, so this step is a no-op.
      - name: Restore Allure history from cache
        uses: actions/cache/restore@v4
        with:
          path: allure-history-cache
          key: allure-history-${{ github.run_id }}
          restore-keys: |
            allure-history-

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run BDD suite (headless Chrome)
        run: mvn -B test -Dheadless=true

      # Runs even when tests fail so the report captures failed scenarios + screenshots.
      - name: Generate Allure report with history
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: target/allure-results
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 20
          gh_pages: allure-history-cache

      # Persist the new report so the NEXT run can use it as history.
      - name: Save Allure history to cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: allure-history
          key: allure-history-${{ github.run_id }}

      # Package the report for GitHub Pages deployment (picked up by the deploy job).
      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-history

      - name: Upload Allure results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results/

      - name: Upload Cucumber HTML report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: target/cucumber-reports/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: test
    # Deploy on every push to main, even when tests fail, so the report is always current.
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy Allure report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
